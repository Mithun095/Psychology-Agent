# Docker Compose for Cycology Agent
# Run: docker-compose up --build

version: '3.9'

services:
  # ============================================
  # FRONTEND - Next.js (Thushara)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cycology-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    networks:
      - cycology-network

  # ============================================
  # BACKEND - FastAPI (Vignesh)
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cycology-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=mongodb://mongo:27017/cycology
      - AGENT_URL=http://agent:8001
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongo
      - redis
    networks:
      - cycology-network

  # ============================================
  # AI AGENT - LangGraph (Myth)
  # ============================================
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: cycology-agent
    ports:
      - "8001:8001"
    volumes:
      - ./agent:/app
      - agent-data:/app/data/raw # Persist downloaded data
    environment:
      - ENVIRONMENT=development
      # For Ollama (local LLM)
      - OLLAMA_HOST=http://host.docker.internal:11434
      # For Groq (free tier)
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      # For Google Gemini (free tier)
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      # For Pinecone (vector database)
      - PINECONE_API_KEY=${PINECONE_API_KEY:-}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME:-cycology-mental-health}
    networks:
      - cycology-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ============================================
  # DATABASE - MongoDB
  # ============================================
  mongo:
    image: mongo:7
    container_name: cycology-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - cycology-network

  # ============================================
  # CACHE - Redis (for sessions & real-time)
  # ============================================
  redis:
    image: redis:alpine
    container_name: cycology-redis
    ports:
      - "6379:6379"
    networks:
      - cycology-network

# ============================================
# NETWORKS & VOLUMES
# ============================================
networks:
  cycology-network:
    driver: bridge

volumes:
  mongo-data:
  agent-data: # Persist downloaded training data
